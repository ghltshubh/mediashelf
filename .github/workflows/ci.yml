# Quality gate: every push/PR runs the backend checks and the frontend build —
# the same four commands used locally (pytest / ruff / mypy / npm run build).
name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: mypy app
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
        working-directory: app/web
      - run: npm run build
        working-directory: app/web
